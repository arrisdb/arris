name: CI

# Runs automatically on every pull request and on pushes to main.
# Frontend checks run only when frontend files change; Rust checks run only
# when Rust files change. The final `ci` job is the single required status
# check to gate merges (see CONTRIBUTING.md / branch protection setup).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which areas changed so the heavy jobs only run when relevant.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            rust:
              - 'crates/**'
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck and build
        run: npm run build
      - name: Test
        run: npm test

  rust:
    name: Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # System libraries required to compile the Tauri shell on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            file \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check workspace
        run: cargo check --workspace --all-targets

      # Unit + doc tests only. Integration tests (tests/*_integration.rs) spin up
      # real database containers and are run separately, not on every PR.
      - name: Test (unit + doc)
        run: cargo test --workspace --lib --bins --doc

      - name: Supply-chain audit
        run: cargo deny check

      # The Tauri build script validates that frontendDist (frontend/dist)
      # exists, so build the frontend bundle before compiling the shell.
      - name: Set up Node for frontend bundle
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend bundle
        run: npm ci && npm run build
        working-directory: frontend
      - name: Build Tauri shell
        run: cargo build --manifest-path src-tauri/Cargo.toml

  # Single required status check. Branch protection should require "CI / ci".
  # Passes when every needed job either succeeded or was skipped (path-filtered),
  # and fails if any required job failed or was cancelled.
  ci:
    name: ci
    needs: [frontend, rust]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks
        run: |
          frontend='${{ needs.frontend.result }}'
          rust='${{ needs.rust.result }}'
          echo "frontend=$frontend rust=$rust"
          for r in "$frontend" "$rust"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "A required check did not pass."
              exit 1
            fi
          done
          echo "All required checks passed."
