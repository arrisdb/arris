name: Frontend CI

# Runs on every pull request and on pushes to main. The frontend job runs
# only when frontend files change; the final `frontend-ci` job is always
# produced so it can be a required status check for branch protection
# (it passes when the frontend job succeeded or was path-skipped).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect frontend changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck and build
        run: npm run build
      - name: Test
        run: npm test

  # Required status check for branch protection: "Frontend CI / frontend-ci".
  frontend-ci:
    name: frontend-ci
    needs: frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify frontend checks
        run: |
          result='${{ needs.frontend.result }}'
          echo "frontend=$result"
          if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
            echo "Frontend checks did not pass."
            exit 1
          fi
          echo "Frontend checks passed (or skipped)."
