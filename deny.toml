# cargo-deny configuration — supply-chain gate for the Rust workspace.
# Run via `make deny` (or `cargo deny check`). See CLAUDE.md "Supply-chain audit".

[graph]
# Audit every target we ship + build on, not just the host triple.
all-features = true

[advisories]
# RustSec advisory database. A known vulnerability or a yanked crate in the
# resolved tree fails the check.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# Documented baseline of pre-existing advisories that have NO available fix or
# are pinned behind a transitive dependency we cannot move without a risky
# semver-major bump. Each entry MUST carry a reason + remediation path. The gate
# still hard-fails on any NEW advisory outside this list. Remediation is tracked
# as a follow-up ticket (see CLAUDE.md "Supply-Chain Audit"). Re-check on every
# dependency bump and remove entries as upstreams ship fixes.
ignore = [
    # rsa: Marvin timing side-channel. No fixed release exists (still RC). Pulled
    # transitively by a SQL driver; risk is local-timing only.
    "RUSTSEC-2023-0071",
    # paste 1.0.15: unmaintained. Deep transitive (proc-macro helper). No fix.
    "RUSTSEC-2024-0436",
    # gix-features 0.38 (SHA-1 collision) — pinned by gix 0.66 (direct dep).
    # Needs a gix semver-major bump; tracked as follow-up.
    "RUSTSEC-2025-0021",
    # serde_yml 0.0.12: unmaintained serde_yaml fork (direct dep). No safe
    # upgrade; replace with a maintained YAML crate. Tracked as follow-up.
    "RUSTSEC-2025-0068",
    # rustls-pemfile: advisory on a version pinned by an older TLS dep. Constrained.
    "RUSTSEC-2025-0134",
    # gix-date 0.9 (non-utf8 string) — pinned by gix 0.66. Same gix bump as above.
    "RUSTSEC-2025-0140",
    # rustls-webpki 0.101.7 — old version pinned transitively. Constrained until
    # the pinning dep updates.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # hickory-proto 0.25 (DNS DoS / unbounded loop) — pinned by mongodb 3.6's
    # resolver. 0118 has no released fix; 0119 needs a mongodb bump. Follow-up.
    "RUSTSEC-2026-0118",
    "RUSTSEC-2026-0119",
    # proc-macro-error2: unmaintained. Deep transitive. No fix.
    "RUSTSEC-2026-0173",
]

[licenses]
# Allow-list of acceptable licenses for third-party dependencies. Anything not
# listed fails the check, forcing a deliberate decision before a new license
# enters the tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "BSL-1.0",            # Boost Software License — permissive
    "bzip2-1.0.6",        # bzip2/libbzip2 — permissive
    "CDLA-Permissive-2.0", # Community Data License Agreement, permissive variant
]
confidence-threshold = 0.8
# Our own workspace crates are unpublished/proprietary and carry no SPDX license
# field; do not flag them as "unlicensed".
private = { ignore = true }

[bans]
# Duplicate versions of the same crate bloat the build and the audit surface.
# Warn (not deny) since the dep graph legitimately carries a few transitive
# duplicates we do not control.
multiple-versions = "warn"
# A wildcard ("*") version requirement defeats reproducible builds.
wildcards = "deny"

[sources]
# Dependencies may only come from crates.io. An unknown registry or a crate
# silently swapped to an arbitrary git repo fails the check.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
